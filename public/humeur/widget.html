<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>L'humeur du boss · widget</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",system-ui,sans-serif; -webkit-font-smoothing:antialiased; background:transparent; }
  a { color:inherit; text-decoration:none; }
  .card { display:flex; align-items:center; gap:16px; background:#FFD500; color:#1A1A1A; border:3px solid #1A1A1A; border-radius:16px; padding:16px 22px; box-shadow:4px 4px 0 #1A1A1A; font-weight:800; transition: transform .15s ease, box-shadow .15s ease; }
  .card:hover { transform: translate(-2px,-2px); box-shadow:6px 6px 0 #1A1A1A; }
  .card:active { transform: translate(2px,2px); box-shadow:2px 2px 0 #1A1A1A; }
  .em { font-size:56px; line-height:1; flex-shrink:0; }
  .body { flex:1; }
  .super { font-size:11px; font-weight:800; letter-spacing:.2em; text-transform:uppercase; opacity:.7; margin-bottom:4px; }
  .label { font-size:28px; font-weight:900; line-height:1; letter-spacing:-.02em; text-transform:uppercase; }
  .msg { font-size:13px; font-weight:600; opacity:.85; margin-top:6px; }
  .cta { background:#1A1A1A; color:#FFD500; padding:10px 16px; border-radius:10px; font-size:13px; font-weight:900; letter-spacing:.1em; text-transform:uppercase; flex-shrink:0; }
  .absent { background: linear-gradient(135deg, #87CEEB 0%, #FFB6C1 100%); }
</style>
</head>
<body>

<a href="https://humeur.labrassee.cafe/" target="_top" class="card" id="card">
  <span class="em" id="em" style="opacity:0;">…</span>
  <div class="body">
    <div class="super">L'humeur du boss aujourd'hui</div>
    <div class="label" id="label">Chargement…</div>
    <div class="msg" id="msg">—</div>
  </div>
  <span class="cta">Voter →</span>
</a>

<script type="module">
  import { getStatus, currentSlide } from "./app.js";
  const status = await getStatus();
  const slide = currentSlide(status);
  const emEl = document.getElementById("em");
  emEl.textContent = slide.e;
  emEl.style.opacity = "1";
  document.getElementById("label").textContent = slide.t;
  document.getElementById("msg").textContent = slide.m;
  if (slide.kind === "absent") document.getElementById("card").classList.add("absent");
</script>

</body>
</html>
