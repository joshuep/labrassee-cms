<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFD500">
<title>L'humeur du boss · La Brassée</title>
<meta name="description" content="Vous l'avez vu. Vous votez. C'est démocratique.">
<style>
  :root { --jaune:#FFD500; --jaune-fonce:#E5BE00; --noir:#1A1A1A; --blanc:#FAF7F0; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--jaune); color: var(--noir); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; overscroll-behavior-y: contain; }
  body { padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; display:flex; flex-direction:column; align-items:stretch; }
  header { text-align:center; padding: 20px 0 18px; }
  .logo { display:inline-flex; align-items:center; gap:8px; font-weight:800; font-size:13px; letter-spacing:.18em; opacity:.8; text-transform:uppercase; }
  .logo .maia { width:28px; height:28px; flex-shrink:0; }
  .logo .maia img { width:100%; height:100%; object-fit:contain; display:block; }
  h1 { font-size: clamp(44px, 11vw, 68px); line-height:.92; margin: 18px 0 6px; font-weight:900; letter-spacing:-.035em; text-transform:uppercase; }
  h1 .qd { display:block; font-size: clamp(20px, 5vw, 30px); font-weight:700; letter-spacing:-.01em; text-transform:none; margin-top:6px; opacity:.85; }
  .subtitle { font-size:14px; opacity:.75; margin: 0 0 22px; font-weight:600; }
  .options { display:grid; grid-template-columns:1fr; gap:12px; flex:1; }
  .opt { display:flex; align-items:center; gap:16px; background:var(--blanc); border:3px solid var(--noir); border-radius:18px; padding:18px 20px; cursor:pointer; transition:transform .12s ease, box-shadow .12s ease, background .2s ease; -webkit-tap-highlight-color:transparent; box-shadow:4px 4px 0 var(--noir); user-select:none; }
  .opt:active { transform: translate(2px,2px); box-shadow:2px 2px 0 var(--noir); }
  .opt.selected { background:var(--noir); color:var(--jaune); }
  .opt.disabled { opacity:.55; cursor:default; }
  .opt .emoji { font-size:38px; line-height:1; flex-shrink:0; }
  .opt .label { font-size:19px; font-weight:800; letter-spacing:-.01em; }
  .opt .meta { margin-left:auto; font-size:13px; font-weight:700; opacity:.5; }
  .opt.selected .meta { opacity:1; color:var(--jaune); }
  footer { text-align:center; padding: 22px 0 12px; font-size:12px; opacity:.6; }
  .thanks { background:var(--noir); color:var(--jaune); border-radius:18px; padding:28px 24px; text-align:center; margin-top:16px; display:none; animation:pop .3s ease; }
  .thanks.show { display:block; }
  .thanks .big { font-size:56px; line-height:1; margin-bottom:8px; }
  .thanks h2 { font-size:22px; font-weight:900; margin:0 0 6px; }
  .thanks p { font-size:14px; margin:0; opacity:.85; }
  .thanks .stats { margin-top:14px; font-size:12px; opacity:.7; }
  .absent-banner { background:linear-gradient(135deg,#87CEEB 0%,#FFB6C1 100%); color:var(--noir); border:3px solid var(--noir); border-radius:18px; padding:24px 20px; text-align:center; margin:16px 0; box-shadow:4px 4px 0 var(--noir); }
  .absent-banner .em { font-size:48px; line-height:1; margin-bottom:8px; display:block; }
  .absent-banner h3 { font-size:24px; font-weight:900; margin:0 0 6px; }
  .absent-banner p { font-size:15px; margin:0; font-weight:700; }
  @keyframes pop { 0%{transform:scale(.95);opacity:0;} 100%{transform:scale(1);opacity:1;} }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="maia"><img src="logo-maia.png" alt=""></span><span>LA BRASSÉE</span></div>
  <h1>L'humeur<br>du boss<span class="qd">aujourd'hui ?</span></h1>
  <p class="subtitle">Vous l'avez vu. Vous votez. C'est démocratique.</p>
</header>

<div id="absent-section"></div>

<div class="options" id="options">
  <div class="opt" data-vote="0"><span class="emoji">🐻</span><span class="label">Mode ours</span><span class="meta">0</span></div>
  <div class="opt" data-vote="1"><span class="emoji">😤</span><span class="label">Pas parlable</span><span class="meta">1</span></div>
  <div class="opt" data-vote="2"><span class="emoji">⚡</span><span class="label">Trop speed</span><span class="meta">2</span></div>
  <div class="opt" data-vote="3"><span class="emoji">😎</span><span class="label">Cool</span><span class="meta">3</span></div>
  <div class="opt" data-vote="4"><span class="emoji">🤩</span><span class="label">Euphorique</span><span class="meta">4</span></div>
</div>

<div class="thanks" id="thanks">
  <div class="big" id="thanks-emoji">…</div>
  <h2 id="thanks-title">Merci !</h2>
  <p id="thanks-msg">Vote enregistré. À demain.</p>
  <div class="stats" id="thanks-stats"></div>
</div>

<footer>1 vote par appareil et par jour · <a href="https://labrassee.cafe" style="color:inherit;">labrassee.cafe</a></footer>

<script type="module">
  import { SLIDES, postVote, getStatus, markVoted, votedToday } from "./app.js";

  const status = await getStatus();
  const isAbsent = status?.etat?.absent;

  if (isAbsent) {
    document.getElementById("absent-section").innerHTML = `
      <div class="absent-banner">
        <span class="em">🎉</span>
        <h3>Il est pas là.</h3>
        <p>Vous pouvez venir !!</p>
      </div>`;
  }

  function showThanks(voteValue, stats) {
    const s = SLIDES[voteValue];
    document.getElementById("thanks-emoji").textContent = s.e;
    document.getElementById("thanks-title").textContent = `Merci ! Vote noté : ${s.t}`;
    document.getElementById("thanks-msg").textContent = s.m;
    if (stats?.nb_votes) {
      document.getElementById("thanks-stats").textContent =
        `${stats.nb_votes} vote${stats.nb_votes>1?"s":""} aujourd'hui · humeur médiane : ${SLIDES[Math.round(stats.median_vote || voteValue)].t.toLowerCase()}`;
    }
    document.getElementById("thanks").classList.add("show");
    document.querySelectorAll(".opt").forEach(o => {
      o.classList.toggle("selected", o.dataset.vote === String(voteValue));
      o.classList.add("disabled");
    });
  }

  const stored = votedToday();
  if (stored !== null && stored !== undefined) {
    showThanks(parseInt(stored, 10), status?.stats);
  }

  document.getElementById("options").addEventListener("click", async (e) => {
    const opt = e.target.closest(".opt");
    if (!opt || opt.classList.contains("disabled")) return;
    if (votedToday() !== null && votedToday() !== undefined) {
      alert("Vous avez déjà voté aujourd'hui. À demain !");
      return;
    }
    const v = parseInt(opt.dataset.vote, 10);
    opt.classList.add("disabled");
    const result = await postVote(v);
    if (result.ok || result.status === 409) {
      markVoted(v);
      showThanks(v, result.data?.stats);
    } else {
      opt.classList.remove("disabled");
      alert("Erreur de vote. Réessayez dans un instant.");
    }
  });
</script>

</body>
</html>
